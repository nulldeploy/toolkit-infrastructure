---
- name: server configuration
  hosts: vps
  become: true
  vars:
    app_user: devops
    app_dir: /home/devops/toolkit
    repo: https://github.com/nulldeploy/toolkit.git
    app_port: 5000
  vars_files:
    - vars/secrets.yml

  pre_tasks:
    - name: cache
      apt:
        update_cache: yes
      changed_when: false
  
  tasks:

    - name: ufw configuring
      ufw:
        rule: allow
        port: "{{ item }}"
      loop: 
        - '22'
        - '80'
        - '443'
  
    - name: ufw enable
      ufw:
        state: enabled
        policy: deny
        logging: on

    - name: install docker
      shell: curl -fsSL https://get.docker.com | sh
      args:
        creates: /usr/bin/docker
    
    - name: adduser
      user:
        name: "{{ app_user }}"
        password: "{{ app_usr_passwd | password_hash('sha512') }}"
        groups: sudo,docker
        append: yes
        shell: /bin/bash
        create_home: yes
        state: present
    
    - name: authorized_key
      authorized_key:
        user: devops
        key: "{{ lookup('file', '~/.ssh/id_ed25519.pub') }}"
        state: present
        
    - name: toolkit git clone
      git:
        repo: "{{ repo }}"
        dest: "{{ app_dir }}"
        version: main
        force: yes
      become: true
      become_user: "{{ app_user }}"
      
    - name: env copy
      template:
        src: templates/env.j2
        dest: "{{ app_dir }}/.env"
        owner: "{{ app_user }}"
        backup: yes 

    - name: toolkit.service copy
      template:
        src: templates/service.j2
        dest: /etc/systemd/system/toolkit.service
        owner: root
        group: root
        backup: yes

    - name: app service
      systemd:
        name: toolkit
        daemon_reload: yes
        enabled: yes
        state: started
        masked: no

    - name: wait for app
      wait_for:
        port: 80
        host: localhost
        timeout: 30

    - name: GET /health
      uri:
        url: http://localhost/health
        method: GET
        status_code: 200
        timeout: 10
      register: response

    - name: response
      debug:
        msg: "{{ response.status }}"

